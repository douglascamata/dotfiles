model = "gpt-5.5"
review_model = "gpt-5.5"
service_tier = "fast"

model_reasoning_summary = "auto"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "xhigh"

# Disable approval prompts (equivalent to --yolo)
approval_policy = "never"
# Grant full system access (equivalent to --yolo)
sandbox_mode = "danger-full-access"

personality = "pragmatic"
web_search = "live"

# Use a tool to search for MCPs, saving context
search_tool = true

[tui]
show_raw_agent_reasoning = true
status_line = [
  "current-dir",
  "git-branch",
  "model-with-reasoning",
  "context-remaining",
  "context-window-size",
  "total-input-tokens",
  "total-output-tokens",
  "used-tokens",
  "five-hour-limit",
  "weekly-limit",
]

[tui.model_availability_nux]
"gpt-5.5" = 3

[features]
streamable_shell = true
unified_exec = true
shell_snapshot = true
skills = true
multi_agent = true
prevent_idle_sleep = true
apps = true
undo = true

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]

[sandbox_workspace_write]
network_access = true
